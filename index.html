<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday, Manisha 💕</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Dancing+Script:wght@400;700&display=swap');
        
        body, html {
            margin: 0; padding: 0;
            overflow: hidden;
            background: #0a0a0a;
            font-family: 'Playfair Display', serif;
            touch-action: manipulation;
        }
        
        .romantic-font { font-family: 'Dancing Script', cursive; }
        
        .section {
            position: absolute; inset: 0;
            display: none; opacity: 0;
            align-items: center; justify-content: center; flex-direction: column;
            padding: 20px; width: 100vw; height: 100vh;
        }

        .section.active { display: flex; opacity: 1; }

        .glass {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        
        .glowing-text { text-shadow: 0 0 15px #ff69b4, 0 0 30px #ff1493; }

        .bg-particles { position: fixed; inset: 0; z-index: 1; pointer-events: none; overflow: hidden; }
        .particle {
            position: absolute; top: -10%; color: #ff69b4; font-size: 20px;
            animation: fall linear infinite;
        }
        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        .wish-card {
            transition: transform 0.3s;
            cursor: pointer;
        }
        .wish-card:hover, .wish-card:active { transform: scale(1.05); }

        .balloon {
            width: 70px; height: 90px;
            background: radial-gradient(circle at 30% 30%, #ff9a9e, #fecfef);
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            position: absolute;
            box-shadow: inset -5px -5px 10px rgba(0,0,0,0.1), 0 5px 15px rgba(255,105,180,0.4);
            cursor: pointer;
            animation: float 4s ease-in-out infinite alternate;
        }
        .balloon::after {
            content: ''; position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%);
            width: 2px; height: 30px; background: rgba(255,255,255,0.5);
        }
        @keyframes float {
            0% { transform: translateY(0px) rotate(-5deg); }
            100% { transform: translateY(-20px) rotate(5deg); }
        }
        
        .pop-text-anim { animation: fadeUp 1s ease-out forwards; }
        @keyframes fadeUp {
            0% { opacity: 0; transform: translateY(20px) scale(0.8); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .cake-container { touch-action: none; filter: drop-shadow(0 15px 30px rgba(236,72,153,0.4)); }
    </style>
</head>
<body>

    <div class="fixed top-4 left-0 w-full text-center z-[100] text-white/70 text-sm font-mono tracking-widest pointer-events-none">
        made by sivasingh instagram📷 - @smss1708
    </div>

    <audio id="bgmusic" loop><source src="tere-liye.mp3" type="audio/mpeg"></audio>

    <div class="bg-particles" id="particles-container"></div>

    <section id="intro" class="section active" style="z-index: 10;">
        <div class="text-center z-20">
            <h1 class="text-7xl md:text-8xl font-bold romantic-font glowing-text mb-4">Hey Manisha 💕</h1>
            <p class="text-3xl text-pink-300 romantic-font mb-12">I have a special surprise for you.</p>
            <button onclick="startExperience()" class="bg-gradient-to-r from-pink-500 to-rose-500 px-10 py-4 rounded-full text-xl font-bold hover:scale-110 transition shadow-lg shadow-pink-500/50 text-white">
                Start Surprise 💖
            </button>
        </div>
    </section>

    <section id="wishes" class="section" style="z-index: 10;">
        <h2 class="text-5xl romantic-font text-pink-300 mb-8 text-center">Open My Wishes 💌</h2>
        <div class="grid grid-cols-2 gap-6 z-20 w-full max-w-md px-4">
            <div class="wish-card glass p-8 rounded-2xl text-center flex items-center justify-center flex-col" onclick="openWish('You are the most beautiful person inside and out. Always keep smiling, Manisha! 🌸')">
                <i class="fa-solid fa-heart text-4xl text-pink-500 mb-2"></i>
                <p class="text-white font-bold">Wish 1</p>
            </div>
            <div class="wish-card glass p-8 rounded-2xl text-center flex items-center justify-center flex-col" onclick="openWish('May all your dreams come true this year. You deserve all the happiness in the world! ✨')">
                <i class="fa-solid fa-star text-4xl text-yellow-400 mb-2"></i>
                <p class="text-white font-bold">Wish 2</p>
            </div>
            <div class="wish-card glass p-8 rounded-2xl text-center flex items-center justify-center flex-col" onclick="openWish('No matter where life takes us, my support and care for you will never end. 💖')">
                <i class="fa-solid fa-gift text-4xl text-rose-500 mb-2"></i>
                <p class="text-white font-bold">Wish 3</p>
            </div>
            <div class="wish-card glass p-8 rounded-2xl text-center flex items-center justify-center flex-col" onclick="openWish('Happy Birthday Manisha! Let\'s make today unforgettable. I love you! 💕')">
                <i class="fa-solid fa-cake-candles text-4xl text-orange-400 mb-2"></i>
                <p class="text-white font-bold">Wish 4</p>
            </div>
        </div>
        <button id="btn-after-wishes" onclick="nextPage('cake')" class="mt-10 bg-white/10 px-8 py-3 rounded-full glass text-white text-lg hidden">
            Next Magic ✨
        </button>

        <div id="wish-modal" class="fixed inset-0 bg-black/90 hidden items-center justify-center z-50 px-6">
            <div class="glass p-10 rounded-3xl text-center max-w-lg w-full relative">
                <p id="wish-text" class="text-3xl romantic-font text-white leading-relaxed"></p>
                <button onclick="closeWish()" class="mt-8 bg-pink-500 text-white px-8 py-2 rounded-full font-bold">Close ✖</button>
            </div>
        </div>
    </section>

    <section id="cake" class="section" style="z-index: 10;">
        <div class="text-center mb-8 z-20 pointer-events-none">
            <h2 class="text-5xl romantic-font text-pink-300">Cut your cake Manisha! 🎂</h2>
            <p class="text-gray-400 mt-2">Drag the knife to cut</p>
        </div>
        <div class="cake-container relative w-[300px] h-[250px] z-20" id="cake-wrapper">
            <div class="relative w-full h-full pointer-events-none">
                <div class="absolute bottom-0 left-1/2 -translate-x-1/2 w-[260px] h-[70px] bg-pink-600 rounded-[50%]"></div>
                <div class="absolute bottom-[50px] left-1/2 -translate-x-1/2 w-[200px] h-[60px] bg-pink-500 rounded-[50%]"></div>
                <div class="absolute bottom-[100px] left-1/2 -translate-x-1/2 w-[140px] h-[50px] bg-rose-500 rounded-[50%]"></div>
                <div class="absolute bottom-[140px] left-1/2 -translate-x-1/2 flex gap-4">
                    <div class="w-3 h-10 bg-white rounded-full"></div>
                    <div class="w-3 h-12 bg-white rounded-full"></div>
                    <div class="w-3 h-10 bg-white rounded-full"></div>
                </div>
            </div>
            <div id="knife" class="absolute top-0 left-1/2 text-6xl pointer-events-none" style="transform: rotate(-30deg); z-index: 30;">🔪</div>
        </div>
        <div id="cake-message" class="hidden text-center mt-8 z-20">
            <h3 class="text-4xl romantic-font glowing-text">Happy Birthday Manisha!</h3>
            <button onclick="nextPage('balloons')" class="mt-6 text-pink-400 border border-pink-400 px-8 py-3 rounded-full hover:bg-pink-400 hover:text-black transition">Play With Balloons 🎈</button>
        </div>
    </section>

    <section id="balloons" class="section" style="z-index: 10;">
        <div class="text-center z-20 mb-10 pointer-events-none">
            <h1 class="text-5xl md:text-7xl romantic-font text-white mb-2">Pop The Balloons! 🎈</h1>
            <p class="text-pink-200">Tap to pop them</p>
        </div>
        
        <div id="balloon-container" class="relative w-full h-[60vh] max-w-lg z-20">
            </div>

        <button id="btn-after-balloons" onclick="goToVideo()" class="absolute bottom-10 bg-gradient-to-r from-pink-500 to-rose-500 px-10 py-4 rounded-full text-xl font-bold text-white shadow-lg hidden z-30">
            See The Final Surprise 🎬
        </button>
    </section>

    <section id="video-page" class="section bg-black" style="z-index: 50; padding: 0;">
        <video id="final-video" src="video1.mp4" playsinline preload="auto" class="w-full h-full object-cover pointer-events-none"></video>
    </section>

    <script>
        let music = document.getElementById('bgmusic');
        let wishesRead = 0;
        let balloonsPopped = 0;
        const totalBalloons = 6;

        function startExperience() {
            music.volume = 0.5;
            music.play().catch(() => { console.log("User interaction required for audio"); });
            nextPage('wishes');
        }

        function nextPage(nextId) {
            const current = document.querySelector('.section.active');
            const next = document.getElementById(nextId);

            gsap.to(current, { opacity: 0, duration: 0.4, onComplete: () => {
                current.classList.remove('active');
                next.classList.add('active');
                gsap.fromTo(next, { opacity: 0, scale: 0.9 }, { opacity: 1, scale: 1, duration: 0.4 });
                
                if(nextId === 'cake') initCake();
                if(nextId === 'balloons') initBalloons();
            }});
        }

        function openWish(text) {
            document.getElementById('wish-text').innerText = text;
            const modal = document.getElementById('wish-modal');
            modal.style.display = 'flex';
            gsap.fromTo(modal.children[0], {scale: 0.5, opacity: 0}, {scale: 1, opacity: 1, duration: 0.3});
            wishesRead++;
        }
        function closeWish() {
            document.getElementById('wish-modal').style.display = 'none';
            if(wishesRead >= 1) { 
                document.getElementById('btn-after-wishes').classList.remove('hidden');
            }
        }

        let isCutting = false;
        function initCake() {
            const wrap = document.getElementById('cake-wrapper');
            const knife = document.getElementById('knife');
            let hasCut = false;
            
            const moveKnife = (e) => {
                if(!isCutting || hasCut) return;
                const rect = wrap.getBoundingClientRect();
                const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
                const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
                knife.style.left = x + 'px';
                knife.style.top = y + 'px';
                
                if(x > 80 && x < 220 && y > 80 && y < 180) {
                    hasCut = true;
                    isCutting = false;
                    document.getElementById('cake-message').classList.remove('hidden');
                    confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
                }
            };

            wrap.addEventListener('pointerdown', (e) => { isCutting = true; moveKnife(e); });
            window.addEventListener('pointermove', moveKnife);
            window.addEventListener('pointerup', () => isCutting = false);
        }

        function initBalloons() {
            const container = document.getElementById('balloon-container');
            container.innerHTML = '';
            balloonsPopped = 0;
            const colors = ['#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3', '#1dd1a1', '#f368e0'];
            
            for(let i=0; i<totalBalloons; i++) {
                let b = document.createElement('div');
                b.className = 'balloon';
                b.style.background = `radial-gradient(circle at 30% 30%, #fff, ${colors[i]})`;
                b.style.left = `${Math.random() * 80 + 10}%`;
                b.style.top = `${Math.random() * 60 + 20}%`;
                b.style.animationDelay = `${Math.random() * 2}s`;
                
                b.onclick = function(e) {
                    confetti({ particleCount: 40, spread: 50, origin: { x: e.clientX/innerWidth, y: e.clientY/innerHeight } });
                    b.style.display = 'none';
                    
                    let text = document.createElement('div');
                    text.innerHTML = "Happy Birthday Manisha 🩵";
                    text.className = "absolute text-pink-300 romantic-font text-2xl font-bold pop-text-anim whitespace-nowrap text-center w-full";
                    text.style.left = "0";
                    text.style.top = b.style.top;
                    container.appendChild(text);
                    
                    balloonsPopped++;
                    if(balloonsPopped === totalBalloons) {
                        document.getElementById('btn-after-balloons').classList.remove('hidden');
                    }
                };
                container.appendChild(b);
            }
        }

        // Fixed Video Logic
        function goToVideo() {
            music.pause();
            
            const current = document.querySelector('.section.active');
            const videoSec = document.getElementById('video-page');
            const video = document.getElementById('final-video');

            gsap.to(current, { opacity: 0, duration: 0.5, onComplete: () => {
                current.classList.remove('active');
                videoSec.classList.add('active');
                
                let playPromise = video.play();
                if (playPromise !== undefined) {
                    playPromise.catch(error => {
                        console.log("Video Play Error:", error);
                    });
                }
            }});
        }

        const pContainer = document.getElementById('particles-container');
        for(let i=0; i<25; i++) {
            let p = document.createElement('div');
            p.className = 'particle';
            p.innerHTML = Math.random() > 0.5 ? '🌹' : '💕';
            p.style.left = `${Math.random() * 100}vw`;
            p.style.animationDuration = `${Math.random() * 3 + 4}s`; 
            p.style.animationDelay = `${Math.random() * 5}s`;
            p.style.fontSize = `${Math.random() * 15 + 10}px`;
            pContainer.appendChild(p);
        }
    </script>
</body>
</html>
