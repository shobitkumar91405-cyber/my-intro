<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Anaya ❤️</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(120deg,#ff6a88,#ff99ac);
overflow:hidden;
text-align:center;
color:white;
}

.page{
display:none;
height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
animation:fade 1s;
}

.active{
display:flex;
}

h1{
font-size:40px;
}

button{
padding:12px 25px;
border:none;
background:white;
color:#ff4d6d;
font-size:18px;
border-radius:20px;
cursor:pointer;
margin-top:20px;
}

img{
width:220px;
border-radius:20px;
box-shadow:0 0 20px rgba(0,0,0,0.3);
}

@keyframes fade{
from{opacity:0}
to{opacity:1}
}

/* balloons */
.balloon{
position:absolute;
bottom:-100px;
font-size:30px;
animation:fly 8s linear infinite;
}

@keyframes fly{
0%{transform:translateY(0)}
100%{transform:translateY(-110vh)}
}
</style>
</head>

<body>

<audio autoplay loop>
<source src="tere-liye.mp3" type="audio/mpeg">
</audio>

<div id="balloons"></div>

<!-- PAGE 1 -->
<div class="page active">
<h1>Hi Anaya ❤️</h1>
<p>This website is only for you</p>
<button onclick="next()">Click</button>
</div>

<!-- PAGE 2 -->
<div class="page">
<h1>🌹 A Flower For You</h1>
<img src="https://media.giphy.com/media/3oriO0OEd9QIDdllqo/giphy.gif">
<button onclick="next()">Next</button>
</div>

<!-- PAGE 3 -->
<div class="page">
<h1>🌹 Another Flower</h1>
<img src="https://media.giphy.com/media/l0MYt5jPR6QX5pnqM/giphy.gif">
<button onclick="next()">Next</button>
</div>

<!-- PAGE 4 -->
<div class="page">
<h1>🌹 Only For Anaya</h1>
<img src="https://media.giphy.com/media/26BRuo6sLetdllPAQ/giphy.gif">
<button onclick="next()">Next</button>
</div>

<!-- PAGE 5 -->
<div class="page">
<h1>I Made for You Anaya ❤️</h1>
<img src="https://media.giphy.com/media/3oriO6qJiXajN0TyDu/giphy.gif">
<p>You are a cutiepie </p>
</div>

<script>

let pages=document.querySelectorAll(".page");
let current=0;

function next(){
pages[current].classList.remove("active");
current++;
if(current<pages.length){
pages[current].classList.add("active");
}
}

/* balloons */
function createBalloon(){
let b=document.createElement("div");
b.className="balloon";
b.innerHTML="🎈 Anaya";
b.style.left=Math.random()*100+"vw";
b.style.animationDuration=5+Math.random()*5+"s";
document.body.appendChild(b);

setTimeout(()=>{b.remove()},8000);
}

setInterval(createBalloon,800);

</script>

</body>
</html>
